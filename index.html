<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Curso ISO 19011:2018</title>

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <div class="app">

    <aside class="sidebar">
      <div class="brand">ISO 19011:2018</div>

      <div class="tag">
        Curso interactivo · inducción + 5 partes · 10 horas
      </div>

      <div class="progress-wrap">
        <div class="progressbar">
          <i id="progressFill"></i>
        </div>

        <div class="progress-label" id="progressLabel"></div>
      </div>

      <nav class="module-nav" id="moduleNav"></nav>
    </aside>

    <main class="main">
      <div class="topbar">

        <div class="brand-left">
          <img
            src="./assets/dym-logo.png"
            alt="DYM Stamping Solution"
            class="dym-logo">
        </div>

        <div class="brand-right">

          <img
            src="./assets/iso19011-logo.png"
            alt="ISO 19011"
            class="iso-logo">

          <button
            id="reset"
            class="btn secondary"
            type="button">
            Reiniciar
          </button>

        </div>
      </div>

      <div id="content"></div>
    </main>

  </div>

  <script src="./js/course-data.js"></script>
  <script src="./js/app.js"></script>
  <script type="module" src="./js/session-guard.js"></script>
</body>
</html>
