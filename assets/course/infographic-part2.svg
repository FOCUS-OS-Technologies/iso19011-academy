<text x="80" y="80" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="900" fill="#19764d" text-anchor="start">PARTE 2 · ¿CÓMO SE ORGANIZA?</text><text x="80" y="125" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="500" fill="#52697d" text-anchor="start">Una auditoría buena se diseña antes de empezar</text><rect x="90" y="175" width="1420" height="110" rx="28" fill="#e9f8ef" stroke="#b9e3c7" stroke-width="3"/><text x="150" y="242" font-family="Arial, Helvetica, sans-serif" font-size="45" font-weight="700" fill="#17324d" text-anchor="start">🎯</text><text x="230" y="230" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" fill="#19764d" text-anchor="start">META</text><text x="230" y="264" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#17324d" text-anchor="start">Auditar lo importante, en el momento correcto, con la gente correcta.</text><rect x="90" y="340" width="330" height="190" rx="26" fill="#ffffff" stroke="#2b8a5a" stroke-width="4"/><circle cx="145" cy="395" r="34" fill="#2b8a5a" stroke="none" stroke-width="0"/><text x="145" y="406" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">1</text><text x="200" y="395" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#17324d" text-anchor="start">🎯</text><text x="125" y="455" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#17324d" text-anchor="start">OBJETIVO</text><text x="125" y="495" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#52697d" text-anchor="start">¿Qué quiero comprobar?</text><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7aa88b"/></marker></defs><line x1="425" y1="435" x2="450" y2="435" stroke="#7aa88b" stroke-width="5" stroke-linecap="round" marker-end="url(#arr)"/><rect x="460" y="340" width="330" height="190" rx="26" fill="#ffffff" stroke="#3a9d65" stroke-width="4"/><circle cx="515" cy="395" r="34" fill="#3a9d65" stroke="none" stroke-width="0"/><text x="515" y="406" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">2</text><text x="570" y="395" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#17324d" text-anchor="start">⚠</text><text x="495" y="455" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#17324d" text-anchor="start">RIESGO</text><text x="495" y="495" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#52697d" text-anchor="start">¿Dónde puede fallar?</text><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7aa88b"/></marker></defs><line x1="795" y1="435" x2="820" y2="435" stroke="#7aa88b" stroke-width="5" stroke-linecap="round" marker-end="url(#arr)"/><rect x="830" y="340" width="330" height="190" rx="26" fill="#ffffff" stroke="#54ad75" stroke-width="4"/><circle cx="885" cy="395" r="34" fill="#54ad75" stroke="none" stroke-width="0"/><text x="885" y="406" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">3</text><text x="940" y="395" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#17324d" text-anchor="start">🗺</text><text x="865" y="455" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#17324d" text-anchor="start">ALCANCE</text><text x="865" y="495" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#52697d" text-anchor="start">¿Hasta dónde revisaré?</text><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7aa88b"/></marker></defs><line x1="1165" y1="435" x2="1190" y2="435" stroke="#7aa88b" stroke-width="5" stroke-linecap="round" marker-end="url(#arr)"/><rect x="1200" y="340" width="330" height="190" rx="26" fill="#ffffff" stroke="#6bb887" stroke-width="4"/><circle cx="1255" cy="395" r="34" fill="#6bb887" stroke="none" stroke-width="0"/><text x="1255" y="406" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">4</text><text x="1310" y="395" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#17324d" text-anchor="start">👥</text><text x="1235" y="455" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#17324d" text-anchor="start">EQUIPO</text><text x="1235" y="495" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#52697d" text-anchor="start">¿Quién tiene la competencia?</text><rect x="90" y="600" width="330" height="190" rx="26" fill="#ffffff" stroke="#82c49a" stroke-width="4"/><circle cx="145" cy="655" r="34" fill="#82c49a" stroke="none" stroke-width="0"/><text x="145" y="666" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">5</text><text x="200" y="655" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#17324d" text-anchor="start">📅</text><text x="125" y="715" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#17324d" text-anchor="start">PLAN</text><text x="125" y="755" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#52697d" text-anchor="start">¿Qué, cuándo y con quién?</text><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7aa88b"/></marker></defs><line x1="425" y1="695" x2="450" y2="695" stroke="#7aa88b" stroke-width="5" stroke-linecap="round" marker-end="url(#arr)"/><rect x="460" y="600" width="330" height="190" rx="26" fill="#ffffff" stroke="#98cfaa" stroke-width="4"/><circle cx="515" cy="655" r="34" fill="#98cfaa" stroke="none" stroke-width="0"/><text x="515" y="666" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">6</text><text x="570" y="655" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#17324d" text-anchor="start">☑</text><text x="495" y="715" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#17324d" text-anchor="start">CHECKLIST</text><text x="495" y="755" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#52697d" text-anchor="start">¿Qué preguntas guían?</text><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7aa88b"/></marker></defs><line x1="795" y1="695" x2="820" y2="695" stroke="#7aa88b" stroke-width="5" stroke-linecap="round" marker-end="url(#arr)"/><rect x="830" y="600" width="330" height="190" rx="26" fill="#ffffff" stroke="#afd9ba" stroke-width="4"/><circle cx="885" cy="655" r="34" fill="#afd9ba" stroke="none" stroke-width="0"/><text x="885" y="666" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">7</text><text x="940" y="655" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#17324d" text-anchor="start">🏭</text><text x="865" y="715" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#17324d" text-anchor="start">EJECUCIÓN</text><text x="865" y="755" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#52697d" text-anchor="start">Ahora sí: vamos a piso</text><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7aa88b"/></marker></defs><line x1="1165" y1="695" x2="1190" y2="695" stroke="#7aa88b" stroke-width="5" stroke-linecap="round" marker-end="url(#arr)"/><rect x="1200" y="600" width="330" height="190" rx="26" fill="#ffffff" stroke="#c3e4cc" stroke-width="4"/><circle cx="1255" cy="655" r="34" fill="#c3e4cc" stroke="none" stroke-width="0"/><text x="1255" y="666" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">8</text><text x="1310" y="655" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#17324d" text-anchor="start">🔁</text><text x="1235" y="715" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#17324d" text-anchor="start">SEGUIMIENTO</text><text x="1235" y="755" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#52697d" text-anchor="start">¿Funcionaron las acciones?</text><rect x="250" y="875" width="1100" height="72" rx="22" fill="#19764d" stroke="#19764d" stroke-width="3"/><text x="800" y="922" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="900" fill="#fff" text-anchor="middle">REGLA: más riesgo = más atención</text>
